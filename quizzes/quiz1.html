<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBS Summer Camp · Quiz 1</title>
<link rel="stylesheet" href="quiz.css">
</head>
<body>
<div class="wrap">

  <header>
    <img src="../assets/sbs-logo.png" alt="SBS Community">
    <div class="kick"><b>Summer Camp</b> &nbsp;·&nbsp; Generative AI</div>
    <h1>Quiz <span class="g">1</span></h1>
    <p class="sub" id="sub">After Session 1 — Welcome to Generative AI</p>
  </header>

  <!-- sign-in gate -->
  <div id="gate">
    <b class="t">Who's taking this quiz?</b>
    <p class="h">Enter your <b>student ID</b> or your <b>Discord username</b>,
       so your score lands on your name.</p>
    <form>
      <input type="text" autocomplete="username" spellcheck="false"
             placeholder="PART-XXXXXXXX-XXXX  or  your Discord username" aria-label="Student ID or Discord username">
      <button type="submit" class="cta">Start quiz</button>
    </form>
    <div class="msg"></div>
    <p class="hint">That is the username you joined the camp Discord server with.</p>
  </div>

  <div id="who"><span>Signed in as <span class="nm"></span></span><button type="button">Not you?</button></div>

  <div id="quizbody" style="display:none">
    <div id="bar"><span></span></div>
    <div id="quiz"></div>
    <div class="actions" id="actions"></div>
    <div id="score"></div>
  </div>

  <a class="back" href="../index.html">← Back to all sessions &amp; quizzes</a>
</div>

<script>
/* ─────────────────────────────────────────────────────────────
   QUESTIONS — edit this array only. The engine lives in quiz-engine.js.
     q      : the question text
     a      : array of answer options
     correct: 0-based index of the right answer in `a`
     why    : explanation shown after answering (optional)
   Leave the array empty ([]) to show the "coming soon" placeholder.

   IMPORTANT: whenever you change `correct` here, update ANSWER_KEYS
   in the Apps Script too — the sheet is graded server-side.
   ───────────────────────────────────────────────────────────── */
window.QUIZ_ID = 'Quiz 1';   // must match the Google Sheet tab name
window.QUESTIONS = [
  /* ── 1–5 · easy ─────────────────────────────────────────────── */
  {
    q: "What makes an AI model “generative” rather than the older kind of AI?",
    a: ["It runs on more powerful computers",
        "It is trained on newer data",
        "It creates new content instead of only sorting existing things into labels",
        "It answers faster than older AI"],
    correct: 2,
    why: "Old AI is a judge — it looks at something that already exists and puts it in a box. Generative AI is an artist: it produces text, images, audio or code that did not exist a second ago."
  },
  {
    q: "Which of these is the old, “judge” style of AI — not generative AI?",
    a: ["Writing a four-line rap about your major",
        "Marking an incoming email as spam or not spam",
        "Painting a cat lawyer in a courtroom from a description",
        "Writing a Python function from a comment"],
    correct: 1,
    why: "Spam / not spam is classification — it labels something that already exists. The other three all produce brand-new content."
  },
  {
    q: "What is a large language model doing every time it writes a word?",
    a: ["Looking the answer up in a stored database",
        "Predicting what word probably comes next, over and over",
        "Searching the live internet for each reply",
        "Following rules an engineer wrote by hand"],
    correct: 1,
    why: "The one secret from Session 1. There is no plan and no sentence it is aiming for — just “what probably comes next?”, thousands of times in a row."
  },
  {
    q: "What do people mean when they say an AI model “hallucinated”?",
    a: ["The model crashed in the middle of a sentence",
        "The model refused to answer the question",
        "The model stated something false just as fluently and confidently as something true",
        "The model repeated the same sentence over and over"],
    correct: 2,
    why: "One rule to tattoo on your brain: it sounds equally confident whether it is right or wrong. Fluent is not the same as true."
  },
  {
    q: "Which everyday tool on your phone is a tiny version of the same idea behind ChatGPT?",
    a: ["The keyboard's next-word autocomplete suggestions",
        "The calculator app",
        "The photo gallery grouping faces together",
        "The spam filter in your inbox"],
    correct: 0,
    why: "Autocomplete predicts the next word from your texts. An LLM is the same job — but it read the internet and weighs tens of thousands of options instead of three."
  },

  /* ── 6–8 · intermediate ─────────────────────────────────────── */
  {
    q: "Computers have existed for 70 years. Which three ingredients had to arrive together for GenAI to explode when it did?",
    a: ["Blockchain, 5G and cloud storage",
        "Quantum computing, robotics and the internet of things",
        "Enormous data, cheap large-scale compute, and the transformer (2017)",
        "Faster phones, better cameras and social media"],
    correct: 2,
    why: "Miss any one and none of this happens: the internet supplied the data, GPUs made the compute affordable, and the 2017 transformer was the recipe that could finally use both."
  },
  {
    q: "In class everyone sent the same prompt and got different answers back. What does that tell you about the model?",
    a: ["Everyone's internet connection was slightly different",
        "It is picking at random from a list of stored, pre-written answers",
        "It generates a fresh response each time rather than retrieving one saved answer",
        "Some students were on a paid plan and some were not"],
    correct: 2,
    why: "That was your first real clue about what happens under the hood. Nothing is being looked up — the answer is built word by word, fresh, every single time."
  },
  {
    q: "Based on the honest scorecard, which job is an LLM *least* reliable for?",
    a: ["Rewriting a clumsy paragraph in a friendlier tone",
        "Brainstorming twenty ideas for a project",
        "Giving exact arithmetic and real, verifiable citations",
        "Summarising a long article you paste into the chat"],
    correct: 2,
    why: "It is brilliant wherever “plausible and fluent” is what you need, and shaky wherever being exactly, verifiably correct matters — citations, arithmetic, fresh news, precise facts."
  },

  /* ── 9–10 · tricky ──────────────────────────────────────────── */
  {
    q: "In the AI-faces study from the cold open (Miller et al., 2023), what did researchers actually find?",
    a: ["People spotted the AI faces almost every time",
        "People labelled AI faces as human *more often* than the real ones — and the most confident people were often the most wrong",
        "Only trained experts could tell the two apart",
        "People could tell only when the images were shown for several seconds"],
    correct: 1,
    why: "That is the twist: not just that people guess wrong, but that the fakes read as *more* human than the real faces — and confidence made accuracy worse, not better."
  },
  {
    q: "You ask a chatbot for help with a research paper. Which part of its reply is most likely to be confidently wrong, and should be checked first?",
    a: ["The list of sources, with authors, titles and page numbers",
        "The rewrite of your clumsy opening paragraph",
        "The suggested outline for your sections",
        "A plain-language explanation of a concept you already understand"],
    correct: 0,
    why: "Citations are exactly where “sounds plausible” and “is true” come apart — a fake reference looks just as convincing to the model as a real one. Treat it like a brilliant intern: use the drafting, verify the 20% that has to be true."
  }
];
</script>
<script src="quiz-config.js"></script>
<script src="quiz-engine.js"></script>
</body>
</html>
