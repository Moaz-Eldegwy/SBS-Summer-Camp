<style>
@font-face{font-family:'Space Grotesk';src:url('assets/SpaceGrotesk-var.woff2') format('woff2');font-weight:300 700;font-display:swap}
@font-face{font-family:'Inter';src:url('assets/Inter-var.woff2') format('woff2');font-weight:100 900;font-display:swap}
:root{--primary:#FF6B6B;--primary-dark:#E05353;--primary-light:#FF8E8E;--accent:#4ECDC4;--accent-dark:#3DB3AB;--ink:#1D2530;--muted:#5F6C7B;--faint:#8E9AA8;--line:rgba(29,37,48,.09);--card:#fff;--shadow:0 12px 32px rgba(29,37,48,.09),0 2px 8px rgba(29,37,48,.05);--r:22px;--fd:'Space Grotesk','Segoe UI',system-ui,sans-serif;--fb:'Inter','Segoe UI',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1280px;height:720px;overflow:hidden;background:transparent}
body{font-family:var(--fb);color:var(--ink);-webkit-font-smoothing:antialiased}
.slide{position:absolute;inset:0;padding:60px 84px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.kicker{display:flex;align-items:center;gap:12px;font:600 14px/1 var(--fb);letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
.kicker::before,.kicker::after{content:'';width:28px;height:8px;border-radius:4px;background:linear-gradient(90deg,var(--primary),var(--accent))}
.in{animation:in .7s cubic-bezier(.2,.7,.2,1) both}
.d1{animation-delay:.12s}.d2{animation-delay:.3s}.d3{animation-delay:.5s}.d4{animation-delay:.7s}
@keyframes in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

.l1{margin-top:30px;font:600 34px/1.2 var(--fd);color:var(--muted);letter-spacing:-.5px}
.l2{margin-top:14px;font:700 64px/1.12 var(--fd);letter-spacing:-2.5px;max-width:1000px}
.l2 .g{background:linear-gradient(92deg,var(--primary) 5%,var(--accent-dark) 95%);-webkit-background-clip:text;background-clip:text;color:transparent}

.tline{margin-top:52px;width:900px}
.track{position:relative;height:10px;border-radius:5px;background:#EDF1F3}
.track .quiet{position:absolute;left:0;top:0;bottom:0;width:86%;border-radius:5px;background:repeating-linear-gradient(90deg,#DDE4E9 0 14px,transparent 14px 24px)}
.track .boom{position:absolute;right:0;top:-3px;bottom:-3px;width:14%;border-radius:8px;
  background:linear-gradient(90deg,var(--primary),var(--accent-dark));box-shadow:0 8px 20px rgba(224,83,83,.35);
  animation:glow 1.8s ease-in-out infinite alternate}
@keyframes glow{from{box-shadow:0 8px 18px rgba(224,83,83,.3)}to{box-shadow:0 10px 30px rgba(61,179,171,.5)}}
.lbls{display:flex;justify-content:space-between;margin-top:14px;font:600 14px/1 var(--fb);color:var(--faint)}
.lbls .hot{color:var(--primary-dark)}

.tease{margin-top:52px;display:flex;align-items:center;gap:16px;font:500 19px/1 var(--fb);color:var(--muted)}
.ing{display:flex;align-items:center;gap:9px;font:700 17px/1 var(--fd);color:var(--ink);background:#fff;border:1px solid var(--line);
  border-radius:30px;padding:13px 20px;box-shadow:var(--shadow)}
.ing i{width:11px;height:11px;border-radius:50%;font-style:normal}
.plus{font:700 22px/1 var(--fd);color:var(--faint)}
</style>

<div class="slide">
  <div class="kicker in">Why now?</div>

  <div class="l1 in d1">Computers have existed for 70 years.</div>
  <div class="l2 in d2">Why did <span class="g">this</span> happen in the last&nbsp;<span class="g">3</span>?</div>

  <div class="tline in d3">
    <div class="track"><div class="quiet"></div><div class="boom"></div></div>
    <div class="lbls"><span>1950s</span><span>1970s</span><span>1990s</span><span>2010s</span><span class="hot">2023 →</span></div>
  </div>

  <div class="tease in d4">
    <span>Three ingredients had to show up at the same time</span>
    <span class="ing"><i style="background:var(--accent-dark)"></i>Data</span><span class="plus">+</span>
    <span class="ing"><i style="background:var(--primary)"></i>Compute</span><span class="plus">+</span>
    <span class="ing"><i style="background:linear-gradient(135deg,var(--primary),var(--accent-dark))"></i>One idea</span>
  </div>
</div>

<script>
(function(){addEventListener('keydown',function(e){parent.postMessage({type:'sbs-key',key:e.key},'*')});addEventListener('message',function(e){var d=e.data||{};if(d.type==='sbs-nav'){var c=false;try{if(window.sbsStep)c=!!window.sbsStep(d.dir)}catch(_){}parent.postMessage({type:'sbs-nav-ack',id:d.id,consumed:c},'*')}})})();
</script>
