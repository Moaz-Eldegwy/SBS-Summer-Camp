<style>
@font-face{font-family:'Space Grotesk';src:url('assets/SpaceGrotesk-var.woff2') format('woff2');font-weight:300 700;font-display:swap}
@font-face{font-family:'Inter';src:url('assets/Inter-var.woff2') format('woff2');font-weight:100 900;font-display:swap}
:root{--primary:#FF6B6B;--primary-dark:#E05353;--primary-light:#FF8E8E;--accent:#4ECDC4;--accent-dark:#3DB3AB;--ink:#1D2530;--muted:#5F6C7B;--faint:#8E9AA8;--line:rgba(29,37,48,.09);--card:#fff;--shadow:0 12px 32px rgba(29,37,48,.09),0 2px 8px rgba(29,37,48,.05);--r:22px;--fd:'Space Grotesk','Segoe UI',system-ui,sans-serif;--fb:'Inter','Segoe UI',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1280px;height:720px;overflow:hidden;background:transparent}
body{font-family:var(--fb);color:var(--ink);-webkit-font-smoothing:antialiased}
.slide{position:absolute;inset:0;padding:60px 100px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.in{animation:in .7s cubic-bezier(.2,.7,.2,1) both}
.d1{animation-delay:.12s}.d2{animation-delay:.3s}.d3{animation-delay:.48s}
@keyframes in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}

.wave{font-size:64px;line-height:1;animation:wob 2.4s ease-in-out infinite;display:inline-block}
@keyframes wob{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(14deg)}}
.big{margin-top:18px;font:700 96px/1.05 var(--fd);letter-spacing:-4px;
  background:linear-gradient(92deg,var(--primary) 5%,var(--accent-dark) 95%);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{margin-top:16px;font:500 22px/1.5 var(--fb);color:var(--muted);max-width:720px}
.sub b{color:var(--ink)}
.next{margin-top:34px;display:flex;align-items:center;gap:16px;padding:18px 30px}
.next .cal{font-size:28px}
.next b{font:700 21px/1.3 var(--fd)}
.next span{display:block;font:400 14.5px/1.4 var(--fb);color:var(--muted);margin-top:3px}
.brand{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;
  font:600 13px/1 var(--fb);letter-spacing:.08em;color:var(--faint)}
.brand img{width:26px;height:26px;object-fit:contain}
</style>

<div class="slide">
  <div class="wave in">👋</div>
  <div class="big in d1">Thank you!</div>
  <div class="sub in d2">You came in curious — you’re leaving knowing <b>the one secret</b> behind all of it. Questions? <b>Drop them in the chat</b> — I’m staying on for a few minutes.</div>
  <div class="card next in d3">
    <span class="cal">🗓️</span>
    <div style="text-align:left">
      <b>Session 2 — Under the Hood + Run One Yourself</b>
      <span>Thursday 23 Jul, 7 PM · bring a laptop 💻</span>
    </div>
  </div>
</div>

<div class="brand"><img src="assets/sbs-logo.png" alt="SBS">Shbab Btsad Shbab · Generative AI</div>

<script>
(function(){addEventListener('keydown',function(e){parent.postMessage({type:'sbs-key',key:e.key},'*')});addEventListener('message',function(e){var d=e.data||{};if(d.type==='sbs-nav'){var c=false;try{if(window.sbsStep)c=!!window.sbsStep(d.dir)}catch(_){}parent.postMessage({type:'sbs-nav-ack',id:d.id,consumed:c},'*')}})})();
</script>
