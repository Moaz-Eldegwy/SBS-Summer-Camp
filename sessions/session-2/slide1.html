<meta charset="utf-8">
<style>
@font-face{font-family:'Space Grotesk';src:url('assets/SpaceGrotesk-var.woff2') format('woff2');font-weight:300 700;font-display:swap}
@font-face{font-family:'Inter';src:url('assets/Inter-var.woff2') format('woff2');font-weight:100 900;font-display:swap}
:root{--primary:#FF6B6B;--primary-dark:#E05353;--primary-light:#FF8E8E;--accent:#4ECDC4;--accent-dark:#3DB3AB;--ink:#1D2530;--muted:#5F6C7B;--faint:#8E9AA8;--line:rgba(29,37,48,.09);--card:#fff;--shadow:0 12px 32px rgba(29,37,48,.09),0 2px 8px rgba(29,37,48,.05);--r:22px;--fd:'Space Grotesk','Segoe UI',system-ui,sans-serif;--fb:'Inter','Segoe UI',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1280px;height:720px;overflow:hidden;background:transparent}
body{font-family:var(--fb);color:var(--ink);-webkit-font-smoothing:antialiased}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.in{animation:in .8s cubic-bezier(.2,.7,.2,1) both}
.d1{animation-delay:.12s}.d2{animation-delay:.26s}.d3{animation-delay:.42s}.d4{animation-delay:.58s}.d5{animation-delay:.74s}
@keyframes in{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}

/* drifting tokens */
.tok{position:absolute;font:600 13px/1 var(--fd);letter-spacing:.06em;color:var(--muted);
  background:rgba(255,255,255,.75);border:1px solid var(--line);border-radius:30px;padding:9px 15px;
  box-shadow:0 2px 10px rgba(29,37,48,.05);opacity:0;animation:drift var(--dur) linear var(--del) infinite}
.tok.teal{color:var(--accent-dark);border-color:rgba(78,205,196,.4)}
.tok.coral{color:var(--primary-dark);border-color:rgba(255,107,107,.35)}
@keyframes drift{
  0%{opacity:0;transform:translateY(26px) rotate(var(--rot))}
  12%{opacity:.85}80%{opacity:.85}
  100%{opacity:0;transform:translateY(-52px) rotate(var(--rot))}
}

.logo{width:88px;height:88px;object-fit:contain;filter:drop-shadow(0 6px 18px rgba(29,37,48,.12))}
.kick{margin-top:22px;font:600 15px/1 var(--fb);letter-spacing:.34em;text-transform:uppercase;color:var(--muted)}
.kick b{color:var(--primary-dark)}
h1{margin-top:14px;font:700 108px/1 var(--fd);letter-spacing:-4px}
h1 .g{background:linear-gradient(94deg,var(--primary) 12%,var(--accent-dark) 88%);-webkit-background-clip:text;background-clip:text;color:transparent}
.session{margin-top:20px;display:flex;align-items:center;gap:14px;font:500 21px/1 var(--fb);color:var(--muted)}
.session .n{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;font:700 16px/1 var(--fd);box-shadow:0 6px 14px rgba(255,107,107,.35)}
.session em{font-style:normal;font-weight:700;color:var(--ink)}
.rule{margin-top:34px;width:64px;height:5px;border-radius:3px;background:linear-gradient(90deg,var(--primary),var(--accent))}
.who{margin-top:26px;font:600 24px/1.2 var(--fd);letter-spacing:-.3px}
.meta{margin-top:14px;display:flex;gap:12px}
.chip{display:inline-flex;align-items:center;gap:9px;font:600 14.5px/1 var(--fb);color:var(--muted);
  background:#fff;border:1px solid var(--line);border-radius:30px;padding:11px 18px;box-shadow:0 2px 8px rgba(29,37,48,.04)}
.dot{width:8px;height:8px;border-radius:50%}
</style>

<div class="tokens" id="toks"></div>

<div class="slide">
  <img class="logo in" src="assets/sbs-logo.png" alt="SBS Community">
  <div class="kick in d1"><b>Summer Camp</b> &nbsp;·&nbsp; AI Course</div>
  <h1 class="in d2">GENERATIVE <span class="g">AI</span></h1>
  <div class="session in d3"><span class="n">2</span> Session Two — <em>&nbsp;Under the Hood + Run One Yourself</em></div>
  <div class="rule in d3"></div>
  <div class="who in d4">Eng. Moaz Eldegwy</div>
  <div class="meta in d5">
    <span class="chip"><span class="dot" style="background:var(--primary)"></span>Thursday 23 July 2026</span>
    <span class="chip"><span class="dot" style="background:var(--accent)"></span>7:00 PM</span>
  </div>
</div>

<script>
(function(){
  /* tonight's vocabulary — every one of these gets explained before the hour is out */
  var words=[['token','teal'],['under','coral'],['stand','coral'],['ing','coral'],['embedding','teal'],['attention',''],
             ['LM head','coral'],['temperature','teal'],['parameters','coral'],['pretraining',''],['7B','teal'],['the sky is ___','']];
  var spots=[[70,120],[180,320],[95,540],[240,900],[70,1010],[200,1130],[540,60],[600,1170],[620,240],[580,980],[420,90],[460,1140]];
  var host=document.getElementById('toks');
  words.forEach(function(w,i){
    var s=document.createElement('span');
    s.className='tok '+w[1]; s.textContent=w[0];
    s.style.top=spots[i][0]+'px'; s.style.left=spots[i][1]+'px';
    s.style.setProperty('--dur',(7+(i%5)*1.6)+'s');
    s.style.setProperty('--del',(i*0.9)+'s');
    s.style.setProperty('--rot',((i%2?1:-1)*(2+i%4))+'deg');
    host.appendChild(s);
  });
})();
</script>
<script>
(function(){addEventListener('keydown',function(e){parent.postMessage({type:'sbs-key',key:e.key},'*')});addEventListener('message',function(e){var d=e.data||{};if(d.type==='sbs-nav'){var c=false;try{if(window.sbsStep)c=!!window.sbsStep(d.dir)}catch(_){}parent.postMessage({type:'sbs-nav-ack',id:d.id,consumed:c},'*')}})})();
</script>
