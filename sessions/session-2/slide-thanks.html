<meta charset="utf-8">
<style>
@font-face{font-family:'Space Grotesk';src:url('assets/SpaceGrotesk-var.woff2') format('woff2');font-weight:300 700;font-display:swap}
@font-face{font-family:'Inter';src:url('assets/Inter-var.woff2') format('woff2');font-weight:100 900;font-display:swap}
:root{--primary:#FF6B6B;--primary-dark:#E05353;--primary-light:#FF8E8E;--accent:#4ECDC4;--accent-dark:#3DB3AB;--ink:#1D2530;--muted:#5F6C7B;--faint:#8E9AA8;--line:rgba(29,37,48,.09);--card:#fff;--shadow:0 12px 32px rgba(29,37,48,.09),0 2px 8px rgba(29,37,48,.05);--r:22px;--fd:'Space Grotesk','Segoe UI',system-ui,sans-serif;--fb:'Inter','Segoe UI',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1280px;height:720px;overflow:hidden;background:transparent}
body{font-family:var(--fb);color:var(--ink);-webkit-font-smoothing:antialiased}
.slide{position:absolute;inset:0;padding:56px 100px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.in{animation:in .7s cubic-bezier(.2,.7,.2,1) both}
.d1{animation-delay:.12s}.d2{animation-delay:.3s}.d3{animation-delay:.48s}.d4{animation-delay:.64s}
@keyframes in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}

.big{font:700 96px/1.05 var(--fd);letter-spacing:-4px;
  background:linear-gradient(92deg,var(--primary) 5%,var(--accent-dark) 95%);-webkit-background-clip:text;background-clip:text;color:transparent}
.ar{margin-top:8px;font:600 30px/1.3 var(--fd);color:var(--muted);letter-spacing:-.5px}
.sub{margin-top:20px;font:500 21px/1.55 var(--fb);color:var(--muted);max-width:740px}
.sub b{color:var(--ink)}

.links{margin-top:30px;display:flex;gap:14px}
.lk{display:inline-flex;align-items:center;gap:11px;padding:14px 22px;text-decoration:none;color:var(--muted);
  font:600 15.5px/1 var(--fb);transition:transform .15s ease,box-shadow .15s ease}
.lk:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(29,37,48,.12)}
.lk svg{width:18px;height:18px;flex:none;color:var(--accent-dark)}
.lk.a svg{color:var(--primary-dark)}

.next{margin-top:26px;display:flex;align-items:center;gap:16px;padding:18px 30px}
.next svg{width:26px;height:26px;flex:none;color:var(--primary-dark)}
.next b{font:700 21px/1.3 var(--fd);letter-spacing:-.3px}
.next span{display:block;font:400 14.5px/1.4 var(--fb);color:var(--muted);margin-top:4px}

.brand{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;
  font:600 13px/1 var(--fb);letter-spacing:.08em;color:var(--faint)}
.brand img{width:26px;height:26px;object-fit:contain}
</style>

<div class="slide">
  <div class="big in">Shukran!</div>
  <div class="ar in d1">شكراً لكم</div>
  <div class="sub in d2">You opened the black box <b>and ran your own model.</b> Be proud of that. Mics are open — <b>any last questions?</b></div>

  <div class="links in d3">
    <a class="card lk a" href="https://moazeldegwy.com" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18 14 14 0 0 1 0-18Z"/></svg>
      moazeldegwy.com
    </a>
    <a class="card lk" href="https://www.linkedin.com/in/moaz-eldegwy/" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M7.5 10.5V17M7.5 7.5v.01M12 17v-4a2.5 2.5 0 0 1 5 0v4"/></svg>
      /in/moaz-eldegwy
    </a>
  </div>

  <div class="card next in d4">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="5" width="18" height="16" rx="3"/><path d="M8 3v4M16 3v4M3 10h18"/>
    </svg>
    <div style="text-align:left">
      <b>Session 3 — Make Models Do What You Want</b>
      <span>Monday 27 July, 7:00 PM · prompting · RAG · fine-tuning</span>
    </div>
  </div>
</div>

<div class="brand"><img src="assets/sbs-logo.png" alt="SBS">Shbab Btsad Shbab · Generative AI</div>

<script>
(function(){addEventListener('keydown',function(e){parent.postMessage({type:'sbs-key',key:e.key},'*')});addEventListener('message',function(e){var d=e.data||{};if(d.type==='sbs-nav'){var c=false;try{if(window.sbsStep)c=!!window.sbsStep(d.dir)}catch(_){}parent.postMessage({type:'sbs-nav-ack',id:d.id,consumed:c},'*')}})})();
</script>
